<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Guess Game</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    overflow:hidden;
    background:#111;
    color:white;
}

#game{
    width:100vw;
    height:100vh;
    position:relative;
}

#streetview{
    width:100%;
    height:100%;
}

#map{
    position:absolute;
    bottom:20px;
    right:20px;
    width:320px;
    height:220px;
    border-radius:14px;
    overflow:hidden;
    border:3px solid white;
    z-index:5;
}

#topBar{
    position:absolute;
    top:15px;
    left:50%;
    transform:translateX(-50%);
    z-index:10;
    background:rgba(0,0,0,0.7);
    padding:12px 20px;
    border-radius:12px;
    font-size:24px;
    font-weight:bold;
}

#bottomUI{
    position:absolute;
    bottom:20px;
    left:20px;
    z-index:10;
    display:flex;
    gap:10px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#1e88e5;
    color:white;
    font-size:18px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#1565c0;
}

#scoreboard{
    position:absolute;
    top:20px;
    right:20px;
    z-index:10;
    background:rgba(0,0,0,0.7);
    padding:15px;
    border-radius:12px;
    width:220px;
}

#roundInfo{
    margin-bottom:10px;
}

#result{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.85);
    padding:25px;
    border-radius:15px;
    text-align:center;
    z-index:20;
    display:none;
    min-width:300px;
}

h2{
    margin-bottom:10px;
}

.player{
    margin-top:8px;
}

</style>
</head>
<body>

<div id="game">

    <div id="streetview"></div>

    <div id="map"></div>

    <div id="topBar">
        ⏱ <span id="timer">60</span>s
    </div>

    <div id="scoreboard">
        <div id="roundInfo">
            Round <span id="round">1</span>/5
        </div>

        <div id="players"></div>
    </div>

    <div id="bottomUI">
        <button onclick="submitGuess()">GUESS</button>
    </div>

    <div id="result">
        <h2>Round Result</h2>
        <p id="distanceText"></p>
        <p id="pointsText"></p>
    </div>

</div>

<script>

const API_KEY = "AIzaSyDw3qNcrzz62Co7xCCccmtcOaRhbuo1uSI";

let streetView;
let map;
let guessMarker = null;
let realMarker = null;
let line = null;

let timer;
let timeLeft = 60;

let currentRound = 1;
let totalRounds = 5;

let guessPosition = null;

let score = 0;

const locations = [

{lat:40.7580,lng:-73.9855},
{lat:48.8584,lng:2.2945},
{lat:51.5007,lng:-0.1246},
{lat:35.6595,lng:139.7005},
{lat:-33.8568,lng:151.2153},
{lat:41.9028,lng:12.4964},
{lat:52.5200,lng:13.4050},
{lat:37.7749,lng:-122.4194},
{lat:25.1972,lng:55.2744},
{lat:-22.9519,lng:-43.2105},
{lat:59.3293,lng:18.0686},
{lat:41.3851,lng:2.1734},
{lat:50.0755,lng:14.4378},
{lat:1.3521,lng:103.8198},
{lat:34.0522,lng:-118.2437},
{lat:43.6532,lng:-79.3832},
{lat:55.7558,lng:37.6173},
{lat:45.5017,lng:-73.5673},
{lat:60.1699,lng:24.9384},
{lat:59.9139,lng:10.7522},
{lat:55.6761,lng:12.5683},
{lat:52.3676,lng:4.9041},
{lat:50.8503,lng:4.3517},
{lat:47.4979,lng:19.0402},
{lat:48.2082,lng:16.3738},
{lat:47.3769,lng:8.5417},
{lat:45.4642,lng:9.1900},
{lat:40.4168,lng:-3.7038},
{lat:38.7223,lng:-9.1393},
{lat:53.3498,lng:-6.2603},
{lat:37.9838,lng:23.7275},
{lat:41.0082,lng:28.9784},
{lat:30.0444,lng:31.2357},
{lat:-33.9249,lng:18.4241},
{lat:-1.2921,lng:36.8219},
{lat:19.0760,lng:72.8777},
{lat:28.6139,lng:77.2090},
{lat:31.2304,lng:121.4737},
{lat:39.9042,lng:116.4074},
{lat:37.5665,lng:126.9780},
{lat:13.7563,lng:100.5018},
{lat:-6.2088,lng:106.8456},
{lat:-37.8136,lng:144.9631},
{lat:49.2827,lng:-123.1207},
{lat:19.4326,lng:-99.1332},
{lat:4.7110,lng:-74.0721},
{lat:-12.0464,lng:-77.0428},
{lat:-33.4489,lng:-70.6693},
{lat:-34.6037,lng:-58.3816},
{lat:-23.5505,lng:-46.6333}

];

let currentLocation;

function initGame(){

    map = new google.maps.Map(document.getElementById("map"),{
        zoom:2,
        center:{lat:20,lng:0},
        disableDefaultUI:true,
        gestureHandling:"greedy"
    });

    map.addListener("click",(e)=>{

        guessPosition = {
            lat:e.latLng.lat(),
            lng:e.latLng.lng()
        };

        if(guessMarker) guessMarker.setMap(null);

        guessMarker = new google.maps.Marker({
            position:guessPosition,
            map:map
        });

    });

    loadRound();

}

function loadRound(){

    clearMap();

    timeLeft = 60;
    document.getElementById("timer").innerText = timeLeft;

    currentLocation = locations[Math.floor(Math.random()*locations.length)];

    const sv = new google.maps.StreetViewService();

    sv.getPanorama({
        location:currentLocation,
        radius:50000
    },(data,status)=>{

        if(status==="OK"){

            streetView = new google.maps.StreetViewPanorama(
                document.getElementById("streetview"),
                {
                    pano:data.location.pano,
                    pov:{
                        heading:Math.random()*360,
                        pitch:0
                    },
                    addressControl:false,
                    showRoadLabels:false,
                    linksControl:true,
                    panControl:false,
                    enableCloseButton:false,
                    fullscreenControl:true
                }
            );

        }else{
            loadRound();
        }

    });

    startTimer();

    updateUI();

}

function startTimer(){

    clearInterval(timer);

    timer = setInterval(()=>{

        timeLeft--;

        document.getElementById("timer").innerText = timeLeft;

        if(timeLeft<=0){
            submitGuess();
        }

    },1000);

}

function submitGuess(){

    clearInterval(timer);

    if(!guessPosition){
        alert("Place a marker on the map first.");
        return;
    }

    realMarker = new google.maps.Marker({
        position:currentLocation,
        map:map,
        icon:"http://maps.google.com/mapfiles/ms/icons/red-dot.png"
    });

    line = new google.maps.Polyline({
        path:[guessPosition,currentLocation],
        geodesic:true,
        strokeColor:"#ff0000",
        strokeOpacity:1,
        strokeWeight:2,
        map:map
    });

    const distance = getDistance(
        guessPosition.lat,
        guessPosition.lng,
        currentLocation.lat,
        currentLocation.lng
    );

    const points = Math.max(0,5000-Math.floor(distance));

    score += points;

    document.getElementById("distanceText").innerHTML =
        "Distance: "+Math.floor(distance)+" km";

    document.getElementById("pointsText").innerHTML =
        "Points: "+points;

    document.getElementById("result").style.display = "block";

    updateUI();

    setTimeout(()=>{

        document.getElementById("result").style.display = "none";

        currentRound++;

        if(currentRound>totalRounds){

            alert("Game Over! Final Score: "+score);
            location.reload();

        }else{

            loadRound();

        }

    },5000);

}

function updateUI(){

    document.getElementById("round").innerText = currentRound;

    document.getElementById("players").innerHTML =
        "<div class='player'>You: "+score+" pts</div>";

}

function clearMap(){

    guessPosition = null;

    if(guessMarker) guessMarker.setMap(null);
    if(realMarker) realMarker.setMap(null);
    if(line) line.setMap(null);

}

function getDistance(lat1,lon1,lat2,lon2){

    const R = 6371;

    const dLat = (lat2-lat1)*Math.PI/180;
    const dLon = (lon2-lon1)*Math.PI/180;

    const a =
        Math.sin(dLat/2)*Math.sin(dLat/2)+
        Math.cos(lat1*Math.PI/180)*
        Math.cos(lat2*Math.PI/180)*
        Math.sin(dLon/2)*Math.sin(dLon/2);

    const c = 2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

    return R*c;

}

</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDw3qNcrzz62Co7xCCccmtcOaRhbuo1uSI&callback=initGame">
</script>

</body>
</html>
