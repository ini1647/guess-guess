<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Multiplayer Hybrid GeoGuessr</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif;}
body{background:#111;color:#fff;}
#topBar{padding:8px 12px;background:#181818;border-bottom:1px solid #333;display:flex;align-items:center;gap:10px;font-size:14px;}
#topBar button{padding:6px 10px;border:none;border-radius:6px;background:#1e88e5;color:#fff;font-weight:bold;cursor:pointer;font-size:13px;}
#topBar button:hover{background:#1565c0;}
#topBar span{margin-right:10px;}
#viewToggle{padding:4px 8px;font-size:12px;background:#333;}
#game{display:flex;height:calc(100vh - 40px);}
#viewMap{flex:1;position:relative;}
#guessMap{flex:1;position:relative;border-left:2px solid #333;}
.mapContainer{width:100%;height:100%;}
#infoBox{position:absolute;top:10px;left:10px;background:rgba(0,0,0,0.7);padding:8px 10px;border-radius:8px;font-size:13px;z-index:500;}
#infoBox div{margin-top:2px;}
#message{margin-left:auto;font-size:13px;color:#ccc;}
#lobby{padding:20px;}
#lobby input,#lobby button,#lobby select{margin-top:8px;padding:8px;border-radius:6px;border:none;font-size:14px;}
#lobby button{background:#1e88e5;color:#fff;font-weight:bold;cursor:pointer;}
#lobby button:hover{background:#1565c0;}
#playerList{margin-top:10px;font-size:14px;}
.playerItem{margin-top:4px;}
.hidden{display:none;}
</style>
</head>
<body>

<div id="lobby">
  <h2>Multiplayer Hybrid GeoGuessr</h2>

  <label>Your Name</label><br>
  <input id="playerName" placeholder="Enter your name">

  <h3>Join a Game</h3>
  <input id="joinRoomInput" placeholder="Room code">
  <button id="joinBtn">Join Game</button>

  <h3>Host a Game</h3>
  <button id="hostBtn">Host Game</button>

  <div id="hostSettings" class="hidden">
    <h3>Host Settings</h3>

    <label>Round Mode</label><br>
    <select id="roundMode">
      <option value="manual">Manual</option>
      <option value="auto">Automatic</option>
    </select>

    <label>Round Time (seconds, auto mode only)</label><br>
    <input id="roundTime" type="number" value="60" min="10" max="300">

    <label>Number of Rounds (1–50)</label><br>
    <input id="roundCount" type="number" value="5" min="1" max="50">

    <button id="startGameBtn">Start Game</button>
  </div>

  <h3>Players</h3>
  <div id="playerList"></div>

  <div id="roomInfo"></div>
</div>

<div id="topBar" class="hidden">
  <button id="newRoundBtn">NEW ROUND</button>
  <button id="guessBtn" disabled>GUESS</button>
  <button id="revealBtn" disabled>SHOW ANSWER</button>
  <button id="viewToggle">View: Satellite</button>
  <span>Round: <span id="roundText">0</span></span>
  <span>Score: <span id="scoreText">0</span></span>
  <span id="message"></span>
</div>

<div id="game" class="hidden">
  <div id="viewMap">
    <div id="viewMapInner" class="mapContainer"></div>
    <div id="infoBox">
      <div><strong>Left:</strong> Random location</div>
      <div><strong>Right:</strong> Click to guess</div>
    </div>
  </div>
  <div id="guessMap">
    <div id="guessMapInner" class="mapContainer"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, update, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDY7Vp4D6kVvuUlEAuPj3fF5HAhgFQyuBM",
  authDomain: "guess-guess-341f2.firebaseapp.com",
  databaseURL: "https://guess-guess-341f2-default-rtdb.firebaseio.com/",
  projectId: "guess-guess-341f2",
  storageBucket: "guess-guess-341f2.firebasestorage.app",
  messagingSenderId: "689612936370",
  appId: "1:689612936370:web:813d881fdd7383c67a65ab"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// DOM
const lobby = document.getElementById("lobby");
const hostBtn = document.getElementById("hostBtn");
const joinBtn = document.getElementById("joinBtn");
const playerNameInput = document.getElementById("playerName");
const joinRoomInput = document.getElementById("joinRoomInput");
const hostSettings = document.getElementById("hostSettings");
const startGameBtn = document.getElementById("startGameBtn");
const playerList = document.getElementById("playerList");
const roomInfo = document.getElementById("roomInfo");

const topBar = document.getElementById("topBar");
const newRoundBtn = document.getElementById("newRoundBtn");
const guessBtn = document.getElementById("guessBtn");
const revealBtn = document.getElementById("revealBtn");
const viewToggle = document.getElementById("viewToggle");
const roundText = document.getElementById("roundText");
const scoreText = document.getElementById("scoreText");
const messageEl = document.getElementById("message");

const roundModeSelect = document.getElementById("roundMode");
const roundTimeInput = document.getElementById("roundTime");
const roundCountInput = document.getElementById("roundCount");

// Maps
let viewMap, guessMap;
let osmLayer, satLayer;
let currentIsSatellite = true;

let currentLocation = null;
let guessMarker = null;
let answerMarker = null;
let lineLayer = null;

let myId = null;
let myName = "";
let myRoom = null;
let isHost = false;

let round = 0;
let score = 0;

// Init maps
function initMaps(){
  viewMap = L.map('viewMapInner', {center:[20,0], zoom:2});
  guessMap = L.map('guessMapInner', {center:[20,0], zoom:2});

  osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
  satLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{x}/{y}');

  satLayer.addTo(viewMap);
  osmLayer.addTo(guessMap);

  guessMap.on('click', e=>{
    placeGuess(e.latlng);
  });
}

function setMessage(msg){
  messageEl.textContent = msg;
}

function randomLatLng(){
  return {
    lat:(Math.random()*180)-90,
    lng:(Math.random()*360)-180
  };
}

function distanceKm(lat1,lon1,lat2,lon2){
  const R=6371;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+
          Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
          Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function placeGuess(latlng){
  if(guessMarker) guessMap.removeLayer(guessMarker);
  guessMarker = L.marker(latlng).addTo(guessMap);
}

function clearRoundGraphics(){
  if(guessMarker){ guessMap.removeLayer(guessMarker); guessMarker=null; }
  if(answerMarker){ guessMap.removeLayer(answerMarker); answerMarker=null; }
  if(lineLayer){ guessMap.removeLayer(lineLayer); lineLayer=null; }
}

function toggleView(){
  if(currentIsSatellite){
    viewMap.removeLayer(satLayer);
    osmLayer.addTo(viewMap);
    currentIsSatellite=false;
    viewToggle.textContent="View: Map";
  }else{
    viewMap.removeLayer(osmLayer);
    satLayer.addTo(viewMap);
    currentIsSatellite=true;
    viewToggle.textContent="View: Satellite";
  }
}

// Multiplayer
function makeId(){
  return Math.random().toString(36).substr(2,9);
}

function roomRef(id){ return ref(db,"rooms/"+id); }
function playersRef(id){ return ref(db,"rooms/"+id+"/players"); }
function stateRef(id){ return ref(db,"rooms/"+id+"/state"); }
function guessesRef(id,r){ return ref(db,"rooms/"+id+"/guesses/round"+r); }

hostBtn.onclick = ()=>{
  myId = makeId();
  myName = playerNameInput.value.trim() || "Player";
  myRoom = makeId().toUpperCase();
  isHost = true;

  set(roomRef(myRoom),{
    host:myId,
    settings:{},
    state:{phase:"lobby",round:0}
  });

  set(ref(db,"rooms/"+myRoom+"/players/"+myId),{
    name:myName,
    score:0
  });

  enterLobby();
};

joinBtn.onclick = ()=>{
  myId = makeId();
  myName = playerNameInput.value.trim() || "Player";
  myRoom = joinRoomInput.value.trim().toUpperCase();
  isHost = false;

  set(ref(db,"rooms/"+myRoom+"/players/"+myId),{
    name:myName,
    score:0
  });

  enterLobby();
};

function enterLobby(){
  lobby.classList.remove("hidden");
  hostSettings.classList.toggle("hidden",!isHost);

  onValue(playersRef(myRoom), snap=>{
    const players = snap.val()||{};
    playerList.innerHTML="";
    Object.values(players).forEach(p=>{
      const div=document.createElement("div");
      div.className="playerItem";
      div.textContent=p.name+" ("+(p.score||0)+" pts)";
      playerList.appendChild(div);
    });
  });

  onValue(stateRef(myRoom), snap=>{
    const st=snap.val();
    if(!st) return;
    if(st.phase==="game"){
      startGameUI();
    }
    if(st.phase==="round"){
      loadRound(st);
    }
    if(st.phase==="reveal"){
      revealRound(st);
    }
  });

  roomInfo.textContent="Room: "+myRoom;
}

startGameBtn.onclick = ()=>{
  const settings = {
    mode:roundModeSelect.value,
    roundTime:parseInt(roundTimeInput.value),
    roundCount:parseInt(roundCountInput.value)
  };

  update(ref(db,"rooms/"+myRoom+"/settings"),settings);
  update(stateRef(myRoom),{phase:"game",round:0});
};

function startGameUI(){
  lobby.classList.add("hidden");
  topBar.classList.remove("hidden");
  document.getElementById("game").classList.remove("hidden");
  initMaps();
}

newRoundBtn.onclick = ()=>{
  if(!isHost) return;
  const loc=randomLatLng();
  round++;
  update(stateRef(myRoom),{
    phase:"round",
    round,
    location:loc
  });
};

function loadRound(st){
  clearRoundGraphics();
  currentLocation=st.location;
  roundText.textContent=st.round;
  guessBtn.disabled=false;
  revealBtn.disabled=true;
  setMessage("Place your guess.");

  viewMap.setView(currentLocation,14);
}

guessBtn.onclick = ()=>{
  if(!guessMarker){
    setMessage("Click on the right map to guess.");
    return;
  }
  const g=guessMarker.getLatLng();
  set(ref(db,"rooms/"+myRoom+"/guesses/round"+round+"/"+myId),{
    lat:g.lat,lng:g.lng
  });
  guessBtn.disabled=true;
  setMessage("Guess submitted.");
  if(isHost){
    revealBtn.disabled=false;
  }
};

revealBtn.onclick = ()=>{
  if(!isHost) return;
  update(stateRef(myRoom),{phase:"reveal",round});
};

function revealRound(st){
  onValue(guessesRef(myRoom,round), snap=>{
    const guesses=snap.val()||{};
    if(answerMarker) guessMap.removeLayer(answerMarker);
    answerMarker=L.marker(currentLocation,{icon:redIcon()}).addTo(guessMap);

    Object.entries(guesses).forEach(([pid,g])=>{
      const m=L.marker([g.lat,g.lng]).addTo(guessMap);
      const line=L.polyline([[g.lat,g.lng],[currentLocation.lat,currentLocation.lng]],{color:"yellow"}).addTo(guessMap);
      lineLayer=line;
      if(pid===myId){
        const d=distanceKm(g.lat,g.lng,currentLocation.lat,currentLocation.lng);
        const pts=Math.max(0,5000-Math.round(d));
        score+=pts;
        scoreText.textContent=score;
        setMessage("You were "+Math.round(d)+" km away. +"+pts+" pts");
      }
    });

    const bounds=L.latLngBounds([currentLocation]);
    Object.values(guesses).forEach(g=>bounds.extend([g.lat,g.lng]));
    guessMap.fitBounds(bounds.pad(0.3));
  });
}

function redIcon(){
  return L.icon({
    iconUrl:"https://maps.gstatic.com/mapfiles/ms2/micons/red-dot.png",
    iconSize:[24,24],
    iconAnchor:[12,24]
  });
}

viewToggle.onclick = toggleView;
</script>

</body>
</html>
